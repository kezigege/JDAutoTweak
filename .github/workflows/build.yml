name: Build JDAutoTweak .deb

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks/releases/download/ios-16.5/iPhoneOS16.5.sdk.tar.xz'

      - name: Build .deb
        run: |
          make package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: JDAutoTweak-deb
          path: packages/*.deb
          retention-days: 30
          if-no-files-found: warn
